name: B
on: push
jobs:
  b:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - run: clang++ -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -framework UIKit -framework Foundation -mios-version-min=13.0 -o a aimlock.mm
    - run: ls -la a
    - run: mkdir -p P/a.app && cp a P/a.app/
    - run: echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>a</string><key>CFBundleIdentifier</key><string>com.aim.ios</string><key>CFBundleName</key><string>Aimlock</string><key>CFBundleVersion</key><string>1</string><key>CFBundlePackageType</key><string>APPL</string><key>LSRequiresIPhoneOS</key><true/><key>UIApplicationSupportsMultipleScenes</key><false/><key>UISceneConfigurations</key><dict><key>UIWindowSceneSessionRoleApplication</key><array><dict><key>UISceneConfigurationName</key><string>Default</string><key>UISceneDelegateClassName</key><string>SceneDelegate</string></dict></array></dict></dict></plist>' > P/a.app/Info.plist
    - run: zip -r i.ipa P/
    - run: ls -la i.ipa
    - uses: actions/upload-artifact@v4
      with:
        name: i
        path: i.ipa
