name: Build IPA
on: push
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - run: clang++ -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -framework UIKit -framework WebKit -framework Foundation -mios-version-min=12.0 -o a aimlock.mm
    - run: mkdir -p Payload/a.app
    - run: cp a Payload/a.app/
    - run: echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>a</string><key>CFBundleIdentifier</key><string>com.aimlock.ios</string><key>CFBundleName</key><string>AimLock</string><key>CFBundleVersion</key><string>2</string><key>CFBundlePackageType</key><string>APPL</string><key>LSRequiresIPhoneOS</key><true/><key>UILaunchStoryboardName</key><string>LaunchScreen</string></dict></plist>' > Payload/a.app/Info.plist
    - run: zip -r aimlock.ipa Payload
    - uses: actions/upload-artifact@v4
      with:
        name: aimlock-ipa
        path: aimlock.ipa
